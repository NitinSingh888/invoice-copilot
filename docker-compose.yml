# One-command local development — everything containerised, no local Python/Node needed:
#
#   docker compose up            # Postgres + backend (hot-reload) + frontend (hot-reload)
#   open http://localhost:5173
#
# The real LLM is used automatically if backend/.env sets IC_LLM_PROVIDER=anthropic + a key
# (copy backend/.env.example → backend/.env). Without it, the deterministic mock is used.
# Source is bind-mounted, so edits hot-reload without rebuilding.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - copilot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # backend/.env provides IC_LLM_PROVIDER + API keys (optional). The DB URL below
    # always wins over it, pointing at the postgres service inside the compose network.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      IC_DATABASE_URL: postgresql+psycopg://copilot:copilot@postgres:5432/copilot
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./backend/data:/app/data
    ports:
      - "8123:8123"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_PROXY: http://backend:8123
    volumes:
      - ./frontend:/app
      - fe_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  copilot_pg:
  fe_node_modules:
