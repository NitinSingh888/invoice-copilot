# Local development database.
# The backend and frontend are run natively (see Makefile: make backend / make frontend).
# Only Postgres needs to be containerised for local dev parity with Neon.
#
#   make db          # start Postgres (waits until healthy)
#   make backend     # FastAPI on :8123 (reads backend/.env)
#   make frontend    # Vite on :5173   (proxies /api → :8123)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - copilot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  copilot_pg:
