name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot
          POSTGRES_DB: copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U copilot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Run tests
        env:
          IC_DATABASE_URL: postgresql+psycopg://copilot:copilot@localhost:5432/copilot
          IC_TEST_DATABASE_URL: postgresql+psycopg://copilot:copilot@localhost:5432/copilot_test
          IC_LLM_PROVIDER: mock
        run: pytest -q
