# Invoice Copilot — Render Blueprint
#
# Before deploying:
#   1. Create a free Postgres on Neon (https://neon.tech).
#   2. Copy the psycopg connection string, e.g.:
#        postgresql+psycopg://user:pass@ep-xxx.region.aws.neon.tech/dbname?sslmode=require
#   3. Set IC_DATABASE_URL in the Render dashboard (Environment tab) to that string.
#
# LLM provider:
#   IC_LLM_PROVIDER defaults to "mock" so the app runs key-free out of the box.
#   To enable the real Anthropic LLM:
#     - Set IC_LLM_PROVIDER=anthropic
#     - Set IC_ANTHROPIC_API_KEY to your Anthropic API key
#
# PORT is injected automatically by Render — no need to set it here.

services:
  - type: web
    name: invoice-copilot
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health

    envVars:
      - key: IC_LLM_PROVIDER
        value: mock

      # Paste your Neon connection string here, e.g.:
      #   postgresql+psycopg://user:pass@ep-xxx.region.aws.neon.tech/dbname?sslmode=require
      - key: IC_DATABASE_URL
        sync: false   # user must supply this — never committed to source control

      # Optional — only needed when IC_LLM_PROVIDER=anthropic
      - key: IC_ANTHROPIC_API_KEY
        sync: false

      # Signs the auth tokens. Render generates a strong random value once and
      # keeps it stable across deploys — never use the insecure dev default in prod.
      - key: IC_JWT_SECRET
        generateValue: true

      - key: PYTHONUNBUFFERED
        value: "1"
